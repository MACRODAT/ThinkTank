<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Central Think Tank</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --border:#21262d;
  --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  --green:#3fb950; --orange:#d29922; --red:#f85149;
  --hf:#4CAF50; --fin:#2196F3; --res:#9C27B0; --ing:#FF9800; --str:#F44336;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
a{color:var(--accent);text-decoration:none;}
.layout{display:flex;height:100vh;}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.main{flex:1;overflow-y:auto;padding:24px;}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
.sidebar-header h1{font-size:14px;font-weight:700;}
.sidebar-header p{font-size:11px;color:var(--muted);margin-top:2px;}
.nav-section{padding:8px 0;}
.nav-label{font-size:10px;text-transform:uppercase;color:var(--muted);padding:4px 16px;letter-spacing:.08em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--muted);border-left:3px solid transparent;transition:all .15s;}
.nav-item:hover,.nav-item.active{background:rgba(88,166,255,.08);color:var(--text);border-left-color:var(--accent);}
.nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.badge{background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto;font-weight:600;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.stat{text-align:center;}
.stat-value{font-size:36px;font-weight:700;}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;}
.dept-card{border-left:4px solid;}
.dept-card .dept-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.dept-card .dept-code{font-size:11px;color:var(--muted);}
.dept-card .dept-stats{display:flex;gap:12px;margin-top:14px;}
.dept-stat{text-align:center;background:var(--bg);padding:8px 12px;border-radius:6px;flex:1;}
.dept-stat-val{font-size:18px;font-weight:700;}
.dept-stat-lbl{font-size:10px;color:var(--muted);}
.run-btn{margin-top:14px;width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:12px;transition:all .15s;}
.run-btn:hover{background:var(--accent);border-color:var(--accent);color:#000;}
.last-run{font-size:11px;color:var(--muted);margin-top:8px;}
.draft-item{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.draft-item:last-child{border-bottom:none;}
.dept-tag{font-size:11px;font-weight:700;color:#fff;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.draft-info{flex:1;min-width:0;}
.draft-title{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.draft-meta{font-size:11px;color:var(--muted);}
.draft-actions{display:flex;gap:6px;flex-shrink:0;}
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.btn-approve{background:var(--green);color:#000;}
.btn-reject{background:var(--red);color:#fff;}
.btn-view{background:var(--border);color:var(--text);}
.btn-approve:hover,.btn-reject:hover{filter:brightness(1.1);}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.mail-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;cursor:pointer;}
.mail-item:hover{background:rgba(255,255,255,.03);}
.mail-item.unread .mail-subj{font-weight:700;color:var(--text);}
.mail-subj{font-size:13px;color:var(--muted);}
.mail-time{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap;}
.arrow-badge{font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;}
.page-header{margin-bottom:24px;}
.page-header h2{font-size:22px;font-weight:700;}
.page-header p{color:var(--muted);font-size:13px;margin-top:4px;}
.run-all-btn{padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;}
.run-all-btn:hover{filter:brightness(1.1);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.modal-meta{font-size:12px;color:var(--muted);margin-bottom:16px;}
.modal-content{font-size:13px;line-height:1.7;white-space:pre-wrap;background:var(--bg);padding:16px;border-radius:8px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-close{background:var(--border);color:var(--text);border:none;padding:6px 14px;border-radius:6px;cursor:pointer;margin-left:auto;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;align-items:center;}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.status-pending{background:rgba(210,153,34,.15);color:var(--orange);}
.status-approved{background:rgba(63,185,80,.15);color:var(--green);}
.status-rejected{background:rgba(248,81,73,.15);color:var(--red);}
/* ── New Draft Form ── */
.nd-modal{max-width:680px;width:96%;max-height:90vh;display:flex;flex-direction:column;padding:0;}
.nd-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.nd-header h3{font-size:15px;font-weight:700;flex:1;}
.nd-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.form-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-textarea{resize:vertical;min-height:200px;line-height:1.7;}
.nd-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;}
.btn-create{background:var(--green);color:#000;border:none;padding:8px 18px;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-create:hover{filter:brightness(1.1);}
.btn-nd-sidebar{margin:8px 12px 4px;width:calc(100% - 24px);padding:8px;background:rgba(63,185,80,.12);border:1px solid var(--green);color:var(--green);border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;}
.btn-nd-sidebar:hover{background:var(--green);color:#000;}
/* ── Full-Screen Editor ── */
.fs-editor{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);flex-direction:column;}
.fs-editor.open{display:flex;}
.fs-topbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.fs-topbar-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.fs-topbar-r{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.fs-dept-tag{font-size:11px;font-weight:700;color:#fff;padding:3px 9px;border-radius:4px;flex-shrink:0;}
.fs-docname{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fs-status{font-size:11px;padding:3px 9px;border-radius:4px;font-weight:700;text-transform:uppercase;}
.fs-sel{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;font-size:12px;outline:none;}
.fs-toolbar{display:flex;align-items:center;gap:2px;padding:5px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap;}
.tbtn{background:transparent;border:1px solid transparent;color:var(--muted);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;transition:all .12s;white-space:nowrap;}
.tbtn:hover{background:rgba(88,166,255,.12);border-color:var(--border);color:var(--text);}
.tsep{width:1px;height:18px;background:var(--border);margin:0 3px;}
.fs-writing{flex:1;overflow-y:auto;display:flex;justify-content:center;background:var(--bg);}
.fs-inner{width:100%;max-width:820px;padding:48px 60px 120px;display:flex;flex-direction:column;}
.fs-title-inp{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:32px;font-weight:800;line-height:1.2;margin-bottom:28px;font-family:inherit;resize:none;overflow:hidden;}
.fs-title-inp::placeholder{color:rgba(139,148,158,.35);}
.fs-content-inp{width:100%;min-height:60vh;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;line-height:1.85;resize:none;font-family:'Segoe UI',system-ui,sans-serif;tab-size:4;}
.fs-content-inp::placeholder{color:rgba(139,148,158,.3);}
.fs-footer{display:flex;align-items:center;gap:10px;padding:8px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.fs-wc{font-size:11px;color:var(--muted);margin-left:auto;}
kbd{background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-size:10px;}
/* ── / Palette ── */
.slash-pal{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:10px;width:300px;max-height:360px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none;}
.slash-pal.open{display:block;}
.slash-search{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;padding:11px 14px;border-bottom:1px solid var(--border);}
.slash-grp{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.08em;padding:7px 14px 3px;}
.slash-item{display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;transition:background .1s;}
.slash-item:hover,.slash-item.sel{background:rgba(88,166,255,.12);}
.slash-ico{width:30px;height:30px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.slash-info .slash-name{font-size:13px;color:var(--text);font-weight:500;}
.slash-info .slash-desc{font-size:11px;color:var(--muted);}
/* ── Settings page ── */
.s-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:20px;}
.s-section h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.s-row{display:flex;align-items:flex-start;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);}
.s-row:last-child{border-bottom:none;}
.s-info{flex:1;min-width:0;}
.s-label{font-size:13px;font-weight:600;color:var(--text);}
.s-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4;}
.s-ctrl{flex-shrink:0;display:flex;align-items:center;gap:8px;}
.toggle-wrap{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.toggle-opt{padding:7px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:var(--bg);border:none;outline:none;transition:all .15s;}
.toggle-opt.on{background:var(--accent);color:#000;}
.s-inp{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:7px;font-size:13px;outline:none;font-family:inherit;width:260px;transition:border-color .15s;}
.s-inp:focus{border-color:var(--accent);}
.s-inp.wide{width:320px;}
.s-sel{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:7px;font-size:13px;outline:none;min-width:200px;}
.s-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;}
.s-btn:hover{border-color:var(--accent);color:var(--accent);}
.s-panel{margin-top:4px;}
.s-panel.hidden{display:none;}
.probe-box{font-size:12px;margin-top:8px;padding:10px 14px;border-radius:7px;background:var(--bg);border:1px solid var(--border);line-height:1.5;}
.probe-ok{border-color:var(--green);color:var(--green);}
.probe-err{border-color:var(--red);color:var(--red);}
.backend-indicator{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.bi-claude{background:rgba(88,166,255,.15);color:var(--accent);}
.bi-ollama{background:rgba(63,185,80,.15);color:var(--green);}
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header"><h1>🏛️ Think Tank</h1><p>Central Operations</p></div>
    <div class="nav-section">
      <div class="nav-label">Overview</div>
      <div class="nav-item active" onclick="nav('dashboard')"><span>📊</span>Dashboard</div>
      <div class="nav-item" onclick="nav('drafts')"><span>📋</span>Drafts<span class="badge" id="drafts-badge" style="display:none"></span></div>
      <div class="nav-item" onclick="nav('mail')"><span>📨</span>Mail Room</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Departments</div>
      <div class="nav-item" onclick="nav('dept','HF')"><span class="dot" style="background:var(--hf)"></span>Health &amp; Welfare</div>
      <div class="nav-item" onclick="nav('dept','FIN')"><span class="dot" style="background:var(--fin)"></span>Finance</div>
      <div class="nav-item" onclick="nav('dept','RES')"><span class="dot" style="background:var(--res)"></span>Research</div>
      <div class="nav-item" onclick="nav('dept','ING')"><span class="dot" style="background:var(--ing)"></span>Engineering</div>
      <div class="nav-item" onclick="nav('dept','STR')"><span class="dot" style="background:var(--str)"></span>Strategy</div>
    </div>
    <button class="btn-nd-sidebar" onclick="openND()">＋ New Draft</button>
    <div class="nav-section">
      <div class="nav-label">Admin</div>
      <div class="nav-item" onclick="nav('audit')"><span>🔍</span>Audit Log</div>
      <div class="nav-item" onclick="nav('projects')"><span>📁</span>Projects</div>
      <div class="nav-item" onclick="nav('settings')"><span>⚙️</span>Settings</div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<!-- View modal -->
<div class="modal-overlay" id="view-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <span id="vm-tag" class="dept-tag"></span>
      <span id="vm-type" style="font-size:12px;color:var(--muted);text-transform:uppercase;"></span>
    </div>
    <h3 id="vm-title"></h3>
    <div class="modal-meta" id="vm-meta"></div>
    <div class="modal-content" id="vm-body"></div>
    <div class="modal-actions">
      <button class="btn btn-approve" id="vm-approve" onclick="qReview(_vmId,'approved')">✓ Approve</button>
      <button class="btn btn-reject" id="vm-reject" onclick="qReview(_vmId,'rejected')">✗ Reject</button>
      <button class="modal-close" onclick="closeVM()">Close</button>
    </div>
  </div>
</div>

<!-- New Draft modal -->
<div class="modal-overlay" id="nd-modal">
  <div class="modal nd-modal">
    <div class="nd-header"><span style="font-size:20px">📝</span><h3>New Draft</h3><button class="modal-close" onclick="closeND()">✕</button></div>
    <div class="nd-body">
      <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="nd-title" type="text" placeholder="e.g. Q3 Health Strategy Review"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Department</label>
          <select class="form-input" id="nd-dept">
            <option value="HF">🩺 HF</option><option value="FIN">💰 FIN</option>
            <option value="RES">🔬 RES</option><option value="ING">⚙️ ING</option><option value="STR">🎯 STR</option>
          </select></div>
        <div class="form-group"><label class="form-label">Type</label>
          <select class="form-input" id="nd-type">
            <option value="strategy">Strategy</option><option value="comprehensive_report">Report</option>
            <option value="research_brief">Research Brief</option><option value="memo">Memo</option>
            <option value="recommendation">Recommendation</option><option value="policy_document">Policy</option>
            <option value="full_analysis">Analysis</option>
          </select></div>
        <div class="form-group"><label class="form-label">Priority</label>
          <select class="form-input" id="nd-priority">
            <option value="normal">Normal</option><option value="high">High</option>
            <option value="urgent">Urgent</option><option value="low">Low</option>
          </select></div>
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">Content * <span style="font-weight:400;text-transform:none;color:var(--muted)">— Markdown supported</span></label>
        <textarea class="form-input form-textarea" id="nd-content" oninput="ndWC()" placeholder="Start writing…&#10;# Heading, **bold**, - list, > quote"></textarea>
      </div>
      <div style="font-size:11px;color:var(--muted)" id="nd-wc">0 words</div>
    </div>
    <div class="nd-footer">
      <button class="btn-create" id="nd-btn" onclick="submitND(false)">💾 Create Draft</button>
      <button class="btn-create" style="background:var(--fin);color:#fff" id="nd-btn2" onclick="submitND(true)">💾 Create &amp; Edit</button>
      <button class="modal-close" onclick="closeND()">Cancel</button>
      <span id="nd-err" style="font-size:12px;color:var(--red);margin-left:8px"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Full-Screen Editor -->
<div id="fs-editor" class="fs-editor">
  <div class="fs-topbar">
    <div class="fs-topbar-l">
      <span id="fs-tag" class="fs-dept-tag"></span>
      <span id="fs-name" class="fs-docname">Untitled</span>
    </div>
    <div class="fs-topbar-r">
      <span id="fs-status" class="fs-status status-pending">pending</span>
      <select id="fs-type" class="fs-sel">
        <option value="strategy">Strategy</option><option value="comprehensive_report">Report</option>
        <option value="research_brief">Research Brief</option><option value="memo">Memo</option>
        <option value="recommendation">Recommendation</option><option value="policy_document">Policy</option>
        <option value="full_analysis">Analysis</option>
      </select>
      <select id="fs-priority" class="fs-sel">
        <option value="normal">Normal</option><option value="high">🟠 High</option>
        <option value="urgent">🔴 Urgent</option><option value="low">🟢 Low</option>
      </select>
      <button class="btn btn-approve" id="fs-save-btn" onclick="fsSave()">💾 Save</button>
      <button class="btn" style="background:var(--fin);color:#fff" onclick="fsSaveApprove()">✓ Approve</button>
      <button class="btn btn-reject" onclick="fsSaveReject()">✗ Reject</button>
      <button class="modal-close" onclick="closeEditor()">✕ Close</button>
    </div>
  </div>
  <div class="fs-toolbar">
    <button class="tbtn" onclick="fsW('# ','',1)">H1</button>
    <button class="tbtn" onclick="fsW('## ','',1)">H2</button>
    <button class="tbtn" onclick="fsW('### ','',1)">H3</button>
    <button class="tbtn" onclick="fsW('#### ','',1)">H4</button>
    <div class="tsep"></div>
    <button class="tbtn" onclick="fsW('**','**')"><b>B</b></button>
    <button class="tbtn" onclick="fsW('*','*')"><i>I</i></button>
    <button class="tbtn" onclick="fsW('~~','~~')"><s>S</s></button>
    <button class="tbtn" onclick="fsW('`','`')">&#96;c&#96;</button>
    <div class="tsep"></div>
    <button class="tbtn" onclick="fsW('- ','',1)">• List</button>

<script>
const API='http://localhost:8000/api';
const COLORS={HF:'#4CAF50',FIN:'#2196F3',RES:'#9C27B0',ING:'#FF9800',STR:'#F44336'};
const PRIO={urgent:'#f85149',high:'#d29922',normal:'#3fb950',low:'#8b949e'};
const ICONS={HF:'🩺',FIN:'💰',RES:'🔬',ING:'⚙️',STR:'🎯'};
let _vmId=null;

window.onload=async()=>{await refreshBadge();nav('dashboard');setInterval(refreshBadge,30000);};

async function refreshBadge(){
  try{const s=await fetch(`${API}/drafts/stats`).then(r=>r.json());
  const b=document.getElementById('drafts-badge');
  const c=s.pending_count||0;
  if(c>0){b.textContent=c;b.style.display='';}else{b.style.display='none';}}catch{}
}

function nav(page,param){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(e=>{
    const oc=e.getAttribute('onclick')||'';
    if(oc.includes(`'${page}'`)&&(!param||oc.includes(`'${param}'`)))e.classList.add('active');
  });
  ({dashboard:renderDash,drafts:renderDrafts,mail:renderMail,dept:renderDept,audit:renderAudit,projects:renderProjects,settings:renderSettings})[page]?.(param);
}

function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'var(--red)':'var(--green)';t.style.color=err?'#fff':'#000';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── Dashboard ── */
async function renderDash(){
  const main=document.getElementById('main');
  main.innerHTML=`<div class="page-header"><h2>🏛️ Central Think Tank</h2><p>Live overview</p></div>
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:24px;">
    <button class="run-all-btn" onclick="runAll()">▶ Run All</button>
    <span id="run-st" style="font-size:13px;color:var(--muted)"></span></div>
  <div id="stats-row" class="grid grid-3" style="margin-bottom:24px"></div>
  <div id="dept-grid" class="grid grid-2"></div>`;
  const [depts,ds]=await Promise.all([fetch(`${API}/departments`).then(r=>r.json()),fetch(`${API}/drafts/stats`).then(r=>r.json())]);
  const mail=depts.reduce((s,d)=>s+(d.unread_mail||0),0);
  document.getElementById('stats-row').innerHTML=`
    <div class="card stat"><div class="stat-value">${depts.length}</div><div class="stat-label">Departments</div></div>
    <div class="card stat"><div class="stat-value" style="color:var(--orange)">${ds.pending_count||0}</div><div class="stat-label">Pending Drafts</div></div>
    <div class="card stat"><div class="stat-value" style="color:var(--accent)">${mail}</div><div class="stat-label">Unread Mail</div></div>`;
  document.getElementById('dept-grid').innerHTML=depts.map(d=>`
    <div class="card dept-card" style="border-left-color:${COLORS[d.id]||'#607D8B'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="dept-name">${d.name}</div><div class="dept-code">${d.code}</div></div>
        <span style="font-size:22px">${ICONS[d.id]||'🏛️'}</span></div>
      <div class="dept-stats">
        <div class="dept-stat"><div class="dept-stat-val" style="color:var(--orange)">${d.pending_drafts||0}</div><div class="dept-stat-lbl">Drafts</div></div>
        <div class="dept-stat"><div class="dept-stat-val" style="color:var(--accent)">${d.unread_mail||0}</div><div class="dept-stat-lbl">Mail</div></div>
      </div>
      <button class="run-btn" onclick="runDept('${d.id}',this)">▶ Run Cycle</button>
      <div class="last-run">Last run: ${d.last_run?d.last_run.replace('T',' ').substring(0,16):'Never'}</div>
    </div>`).join('');
}

async function runAll(){
  const s=document.getElementById('run-st');
  s.innerHTML='<span class="spinner"></span> Starting…';
  try{await fetch(`${API}/departments/run-all`,{method:'POST'});toast('All cycles started');s.textContent='✓ Started';}
  catch{s.textContent='✗ Failed';}
}
async function runDept(id,btn){
  const o=btn.textContent;btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
  try{await fetch(`${API}/departments/${id}/run`,{method:'POST'});toast(`${id} started`);}
  catch{toast('Failed',true);}
  setTimeout(()=>{btn.textContent=o;btn.disabled=false;},2000);
}
</script>

<script>
/* ── Drafts ── */
async function renderDrafts(filter){
  const main=document.getElementById('main');
  main.innerHTML=`<div class="page-header"><h2>📋 Draft Vault</h2><p>AI-generated documents awaiting review</p></div>
  <div class="tabs">
    <div class="tab ${!filter||filter==='pending'?'active':''}" onclick="renderDrafts('pending')">Pending</div>
    <div class="tab ${filter==='all'?'active':''}" onclick="renderDrafts('all')">All Drafts</div>
    <button class="btn-create" style="margin-left:auto;margin-bottom:4px" onclick="openND()">＋ New Draft</button>
  </div>
  <div class="card" style="padding:0"><div id="drafts-list"><div class="empty"><span class="spinner"></span></div></div></div>`;
  const url=(!filter||filter==='pending')?`${API}/drafts/pending`:`${API}/drafts?limit=100`;
  const drafts=await fetch(url).then(r=>r.json());
  const list=document.getElementById('drafts-list');
  if(!drafts.length){list.innerHTML='<div class="empty">✓ No drafts here</div>';return;}
  list.innerHTML=drafts.map(d=>`
    <div class="draft-item">
      <div class="priority-dot" style="background:${PRIO[d.priority]||'#8b949e'}"></div>
      <span class="dept-tag" style="background:${COLORS[d.dept_id]||'#607D8B'}">${d.dept_id}</span>
      <div class="draft-info">
        <div class="draft-title">${d.title}</div>
        <div class="draft-meta">${d.draft_type.toUpperCase()} · ${d.created_at.substring(0,16).replace('T',' ')}
          ${d.status!=='pending'?`· <span style="color:${d.status==='approved'?'var(--green)':'var(--red)'}">${d.status}</span>`:''}
        </div>
      </div>
      <div class="draft-actions">
        <button class="btn btn-view" onclick="openEditor('${d.id}')">✏ Edit</button>
        <button class="btn" style="background:var(--border);color:var(--text)" onclick="viewDraft('${d.id}')">View</button>
        ${d.status==='pending'?`<button class="btn btn-approve" onclick="qReview('${d.id}','approved')">✓</button>
        <button class="btn btn-reject" onclick="qReview('${d.id}','rejected')">✗</button>`:''}
      </div>
    </div>`).join('');
  await refreshBadge();
}

async function viewDraft(id){
  const d=await fetch(`${API}/drafts/${id}`).then(r=>r.json());
  _vmId=id;
  const c=COLORS[d.dept_id]||'#607D8B';
  document.getElementById('vm-tag').textContent=d.dept_id;document.getElementById('vm-tag').style.background=c;
  document.getElementById('vm-type').textContent=d.draft_type;
  document.getElementById('vm-title').textContent=d.title;
  document.getElementById('vm-meta').textContent=`${d.dept_name} · ${d.created_at.substring(0,16).replace('T',' ')} · ${d.priority}`;
  document.getElementById('vm-body').textContent=d.content;
  document.getElementById('vm-approve').style.display=d.status==='pending'?'':'none';
  document.getElementById('vm-reject').style.display=d.status==='pending'?'':'none';
  document.getElementById('view-modal').classList.add('open');
}
function closeVM(){document.getElementById('view-modal').classList.remove('open');_vmId=null;}
document.getElementById('view-modal').addEventListener('click',e=>{if(e.target===document.getElementById('view-modal'))closeVM();});

async function qReview(id,action){
  await fetch(`${API}/drafts/${id}/review`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});
  toast(`Draft ${action}`);
  closeVM();
  renderDrafts('pending');
}

/* ── Mail ── */
let _allMail=[];
async function renderMail(){
  const main=document.getElementById('main');
  main.innerHTML=`<div class="page-header"><h2>📨 Mail Room</h2><p>Inter-department communications</p></div>
  <div style="margin-bottom:16px">
    <select id="mail-filter" onchange="filterMail()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px">
      <option value="all">All Departments</option>
      <option value="HF">HF</option><option value="FIN">FIN</option>
      <option value="RES">RES</option><option value="ING">ING</option><option value="STR">STR</option>
    </select></div>
  <div class="card" style="padding:0"><div id="mail-list"><div class="empty"><span class="spinner"></span></div></div></div>`;
  _allMail=await fetch(`${API}/mail?limit=100`).then(r=>r.json());
  renderMailList(_allMail);
}
function filterMail(){const f=document.getElementById('mail-filter').value;renderMailList(f==='all'?_allMail:_allMail.filter(m=>m.from_dept===f||m.to_dept===f));}
function renderMailList(mails){
  const l=document.getElementById('mail-list');
  if(!mails.length){l.innerHTML='<div class="empty">No mail</div>';return;}
  l.innerHTML=mails.map(m=>{
    const fc=COLORS[m.from_dept]||'#607D8B',tc=COLORS[m.to_dept]||'#607D8B',u=m.status==='unread';
    return `<div class="mail-item ${u?'unread':''}" onclick="viewThread('${m.thread_id}','${m.id}')">
      <span class="arrow-badge" style="background:${fc};color:#fff">${m.from_dept}</span>
      <span style="color:var(--muted);font-size:12px">→</span>
      <span class="arrow-badge" style="background:${tc};color:#fff">${m.to_dept}</span>
      <div style="flex:1;min-width:0;padding:0 8px">
        <div class="mail-subj ${u?'':''}">${u?'● ':''}<strong>${m.subject}</strong></div>
        <div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.body.substring(0,80)}…</div>
      </div>
      <div style="text-align:right;flex-shrink:0"><div class="mail-time">${m.created_at.substring(0,16).replace('T',' ')}</div>
        <div style="font-size:10px;color:${m.priority==='urgent'?'var(--red)':m.priority==='high'?'var(--orange)':'var(--muted)'}">${m.priority}</div></div>
    </div>`;}).join('');
}
async function viewThread(tid,mid){
  await fetch(`${API}/mail/${mid}/read`,{method:'POST'});
  const thread=await fetch(`${API}/mail/thread/${tid}`).then(r=>r.json());
  const main=document.getElementById('main');const first=thread[0]||{};
  main.innerHTML=`<div style="margin-bottom:16px"><button class="btn btn-view" onclick="renderMail()">← Back</button></div>
  <div class="page-header"><h2>${first.subject||'Thread'}</h2><p>${thread.length} message(s)</p></div>
  <div style="display:flex;flex-direction:column;gap:12px">${thread.map(m=>`
    <div class="card">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
        <span class="dept-tag" style="background:${COLORS[m.from_dept]||'#607D8B'}">${m.from_dept}</span>
        <span style="color:var(--muted);font-size:12px">→</span>
        <span class="dept-tag" style="background:${COLORS[m.to_dept]||'#607D8B'}">${m.to_dept}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${m.created_at.substring(0,16).replace('T',' ')}</span>
      </div>
      <div style="font-size:13px;line-height:1.7;white-space:pre-wrap">${m.body}</div>
    </div>`).join('')}</div>`;
  await refreshBadge();
}
</script>

        <div class="mail-item" onclick="viewThread('${m.thread_id}','${m.id}')">

<script>
/* ── New Draft ── */
function openND(dept){
  document.getElementById('nd-title').value='';
  document.getElementById('nd-content').value='';
  document.getElementById('nd-type').value='strategy';
  document.getElementById('nd-priority').value='normal';
  document.getElementById('nd-err').textContent='';
  if(dept)document.getElementById('nd-dept').value=dept;
  ndWC();
  document.getElementById('nd-modal').classList.add('open');
  setTimeout(()=>document.getElementById('nd-title').focus(),80);
}
function closeND(){document.getElementById('nd-modal').classList.remove('open');}
document.getElementById('nd-modal').addEventListener('click',e=>{if(e.target===document.getElementById('nd-modal'))closeND();});

function ndWC(){
  const v=document.getElementById('nd-content').value;
  document.getElementById('nd-wc').textContent=v.trim().split(/\s+/).filter(Boolean).length.toLocaleString()+' words';
}

async function submitND(openAfter){
  const title=document.getElementById('nd-title').value.trim();
  const content=document.getElementById('nd-content').value.trim();
  const dept_id=document.getElementById('nd-dept').value;
  const type=document.getElementById('nd-type').value;
  const priority=document.getElementById('nd-priority').value;
  const err=document.getElementById('nd-err');
  if(!title){err.textContent='Title required.';return;}
  if(!content){err.textContent='Content required.';return;}
  err.textContent='';
  const b1=document.getElementById('nd-btn'),b2=document.getElementById('nd-btn2');
  b1.textContent='⏳…';b1.disabled=b2.disabled=true;
  try{
    const data=await fetch(`${API}/drafts`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({dept_id,draft_type:type,title,content,priority})}).then(r=>r.json());
    if(data.draft_id){toast('Draft created ✓');closeND();await refreshBadge();
      if(openAfter)openEditor(data.draft_id);
      else{const m=document.getElementById('main');if(m.querySelector('#drafts-list'))renderDrafts('pending');}
    }else{err.textContent='Server error.';}
  }catch(e){err.textContent='Network error: '+e.message;}
  b1.textContent='💾 Create Draft';b1.disabled=b2.disabled=false;
}
</script>

<script>
/* ════════════════════════════════════════════
   FULL-SCREEN EDITOR
   ════════════════════════════════════════════ */
let _eid=null,_edata=null,_undos=[],_redos=[];

async function openEditor(id){
  const d=await fetch(`${API}/drafts/${id}`).then(r=>r.json());
  _eid=id;_edata=d;_undos=[];_redos=[];
  const c=COLORS[d.dept_id]||'#607D8B';
  document.getElementById('fs-tag').textContent=d.dept_id;
  document.getElementById('fs-tag').style.background=c;
  document.getElementById('fs-name').textContent=d.title||'Untitled';
  document.getElementById('fs-title-inp').value=d.title||'';
  document.getElementById('fs-content-inp').value=d.content||'';
  document.getElementById('fs-type').value=d.draft_type;
  document.getElementById('fs-priority').value=d.priority;
  const sb=document.getElementById('fs-status');
  sb.textContent=d.status;sb.className='fs-status status-'+d.status;
  fsTitleResize(document.getElementById('fs-title-inp'));
  fsWC();fsSnap();
  document.getElementById('fs-editor').classList.add('open');
  document.getElementById('fs-content-inp').focus();
}
function closeEditor(){
  document.getElementById('fs-editor').classList.remove('open');
  slashClose();_eid=null;_edata=null;
}

async function _fsPatch(action){
  if(!_eid)return;
  const title=document.getElementById('fs-title-inp').value.trim();
  const content=document.getElementById('fs-content-inp').value;
  const draft_type=document.getElementById('fs-type').value;
  const priority=document.getElementById('fs-priority').value;
  await fetch(`${API}/drafts/${_eid}/update`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,content,draft_type,priority})});
  if(action)await fetch(`${API}/drafts/${_eid}/review`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action})});
  document.getElementById('fs-name').textContent=title||'Untitled';
}

async function fsSave(){
  const btn=document.getElementById('fs-save-btn');
  btn.textContent='⏳';btn.disabled=true;
  try{await _fsPatch(null);toast('Saved ✓');}catch{toast('Save failed',true);}
  btn.textContent='💾 Save';btn.disabled=false;
}
async function fsSaveApprove(){await _fsPatch('approved');toast('Saved & approved ✓');closeEditor();renderDrafts('pending');await refreshBadge();}
async function fsSaveReject(){await _fsPatch('rejected');toast('Rejected');closeEditor();renderDrafts('pending');await refreshBadge();}

/* Toolbar */
function fsW(pre,post,line){
  const ta=document.getElementById('fs-content-inp');
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e);
  fsSnap();
  const rep=line?(sel||'text').split('\n').map(l=>pre+l).join('\n'):pre+(sel||'text')+post;
  ta.value=ta.value.substring(0,s)+rep+ta.value.substring(e);
  ta.selectionStart=s;ta.selectionEnd=s+rep.length;ta.focus();fsWC();
}
function fsIns(txt){
  const ta=document.getElementById('fs-content-inp'),s=ta.selectionStart;
  fsSnap();ta.value=ta.value.substring(0,s)+txt+ta.value.substring(s);
  ta.selectionStart=ta.selectionEnd=s+txt.length;ta.focus();fsWC();
}
function fsNum(){
  const ta=document.getElementById('fs-content-inp'),s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e)||'Item';fsSnap();
  const rep=sel.split('\n').map((l,i)=>`${i+1}. ${l}`).join('\n');
  ta.value=ta.value.substring(0,s)+rep+ta.value.substring(e);ta.focus();fsWC();
}
function fsDate(){fsIns(new Date().toISOString().split('T')[0]);}
function fsTable(){fsIns('\n| Col 1 | Col 2 | Col 3 |\n|-------|-------|-------|\n| Cell  | Cell  | Cell  |\n');}
function fsTOC(){fsIns('\n## Table of Contents\n\n- [Section 1](#section-1)\n- [Section 2](#section-2)\n\n');}
function fsTitleResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function fsWC(){
  const v=document.getElementById('fs-content-inp').value;
  document.getElementById('fs-wc').textContent=v.trim().split(/\s+/).filter(Boolean).length.toLocaleString()+' words · '+v.length.toLocaleString()+' chars';
}
function fsSnap(){
  const v=document.getElementById('fs-content-inp').value;
  if(!_undos.length||_undos[_undos.length-1]!==v){_undos.push(v);_redos=[];if(_undos.length>100)_undos.shift();}
}
function fsUndo(){const ta=document.getElementById('fs-content-inp');if(_undos.length<2)return;_redos.push(_undos.pop());ta.value=_undos[_undos.length-1];fsWC();}
function fsRedo(){const ta=document.getElementById('fs-content-inp');if(!_redos.length)return;const v=_redos.pop();_undos.push(v);ta.value=v;fsWC();}

function fsKD(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();fsSave();return;}
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();fsUndo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();fsRedo();return;}
  if(e.key==='Tab'){e.preventDefault();fsIns('    ');return;}
  if(e.key==='Escape'){slashClose();return;}
  if(_slashOpen){
    if(e.key==='ArrowDown'){e.preventDefault();slashMove(1);}
    else if(e.key==='ArrowUp'){e.preventDefault();slashMove(-1);}
    else if(e.key==='Enter'){e.preventDefault();slashCommit();}
  }
}
</script>

<script>
/* ── / Slash palette ── */
let _slashOpen=false,_slashStart=-1,_slashPos=0,_slashFiltered=[];

const BLOCKS=[
  {g:'Text',    ic:'¶',  n:'Paragraph',      d:'A plain text block.',              ins:'\n'},
  {g:'Text',    ic:'T',  n:'Heading 1',       d:'Big important heading.',           ins:'\n# '},
  {g:'Text',    ic:'T',  n:'Heading 2',       d:'Secondary heading.',               ins:'\n## '},
  {g:'Text',    ic:'T',  n:'Heading 3',       d:'Smaller heading.',                 ins:'\n### '},
  {g:'Text',    ic:'T',  n:'Heading 4',       d:'Smallest heading.',                ins:'\n#### '},
  {g:'Text',    ic:'≡',  n:'Bulleted List',   d:'Simple bulleted list.',            ins:'\n- '},
  {g:'Text',    ic:'1',  n:'Numbered List',   d:'Numbered ordered list.',           ins:'\n1. '},
  {g:'Text',    ic:'—',  n:'Divider',         d:'Horizontal line.',                 ins:'\n\n---\n\n'},
  {g:'Text',    ic:'❝',  n:'Blockquote',      d:'Highlight a quote.',               ins:'\n> '},
  {g:'Text',    ic:'📣', n:'Callout',         d:'Highlight important content.',     ins:'\n> [!NOTE]\n> '},
  {g:'Structure',ic:'⊞', n:'Table',           d:'Create a simple table.',           ins:'\n| Col 1 | Col 2 | Col 3 |\n|-------|-------|-------|\n| Cell  | Cell  | Cell  |\n'},
  {g:'Structure',ic:'{}',n:'Code Block',      d:'Insert a fenced code block.',      ins:'\n```\ncode here\n```\n'},
  {g:'Structure',ic:'`', n:'Inline Code',     d:'Inline code span.',                ins:'`code`'},
  {g:'Structure',ic:'≣', n:'Table of Contents',d:'List of headings.',              ins:'\n## Table of Contents\n\n- [Section 1](#section-1)\n- [Section 2](#section-2)\n\n'},
  {g:'Structure',ic:'▶', n:'Collapsible H1',  d:'Collapsible main heading.',        ins:'\n<details>\n<summary>Section</summary>\n\nContent here\n\n</details>\n'},
  {g:'Structure',ic:'▶', n:'Collapsible H2',  d:'Collapsible secondary heading.',   ins:'\n<details>\n<summary>Section</summary>\n\nContent\n\n</details>\n'},
  {g:'Structure',ic:'⊟', n:'Two Columns',     d:'Two-column layout.',               ins:'\n| Left | Right |\n|------|-------|\n|      |       |\n'},
  {g:'Insert',  ic:'📅', n:'Date',            d:"Today's date.",                    ins:new Date().toISOString().split('T')[0]},
  {g:'Insert',  ic:'🔔', n:'Reminder',        d:'Set a reminder block.',            ins:'\n> [!REMINDER]\n> Date: YYYY-MM-DD\n> Note: \n'},
  {g:'Insert',  ic:'📄', n:'Page Break',      d:'Insert a page separator.',         ins:'\n\n---\n*— Page Break —*\n\n---\n\n'},
  {g:'Insert',  ic:'🗂', n:'Project',         d:'New project block.',               ins:'\n## Project: [Name]\n**Status:** Active\n**Priority:** High\n**Owner:** \n**Deadline:** \n\n### Objectives\n- \n\n### Key Results\n- \n'},
  {g:'Insert',  ic:'📊', n:'Inline Database', d:'Database inside this page.',       ins:'\n| # | Name | Status | Priority | Date |\n|---|------|--------|----------|------|\n| 1 |      |        |          |      |\n'},
  {g:'Insert',  ic:'🧠', n:'Entity Mention',  d:'Reference a department/project.',  ins:'[['},
];

function fsKU(e){
  const ta=document.getElementById('fs-content-inp'),pos=ta.selectionStart,val=ta.value;
  if(e.key==='/'){_slashStart=pos-1;_slashFiltered=BLOCKS;slashOpen(ta,pos);slashRender('');return;}
  if(!_slashOpen)return;
  if(_slashStart>=0&&pos>_slashStart){
    const q=val.substring(_slashStart+1,pos);
    if(/\n/.test(q)){slashClose();return;}
    slashRender(q);
  }else{slashClose();}
}

function slashOpen(ta,caretPos){
  _slashOpen=true;_slashPos=0;
  const pal=document.getElementById('slash-pal');pal.classList.add('open');
  document.getElementById('slash-search').value='';
  const rect=ta.getBoundingClientRect(),lh=27;
  const lines=ta.value.substring(0,caretPos).split('\n');
  const ln=lines.length,col=lines[ln-1].length;
  let top=rect.top+(ln*lh)-ta.scrollTop+10,left=rect.left+Math.min(col*8,300);
  top=Math.min(top,window.innerHeight-380);left=Math.min(left,window.innerWidth-320);
  pal.style.top=top+'px';pal.style.left=left+'px';
}
function slashClose(){
  _slashOpen=false;_slashStart=-1;
  document.getElementById('slash-pal').classList.remove('open');
}
function slashFilter(q){slashRender(q);}
function slashRender(q){
  const lq=q.toLowerCase().trim();
  _slashFiltered=lq?BLOCKS.filter(b=>b.n.toLowerCase().includes(lq)||b.d.toLowerCase().includes(lq)||b.g.toLowerCase().includes(lq)):BLOCKS;
  _slashPos=0;
  const list=document.getElementById('slash-list');
  if(!_slashFiltered.length){list.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No results</div>';return;}
  let html='',lg=null;
  _slashFiltered.forEach((b,i)=>{
    if(b.g!==lg){html+=`<div class="slash-grp">${b.g}</div>`;lg=b.g;}
    html+=`<div class="slash-item ${i===0?'sel':''}" data-i="${i}" onclick="slashSelect(${i})">
      <div class="slash-ico">${b.ic}</div>
      <div class="slash-info"><div class="slash-name">${b.n}</div><div class="slash-desc">${b.d}</div></div>
    </div>`;
  });
  list.innerHTML=html;
}
function slashMove(d){
  _slashPos=Math.max(0,Math.min(_slashFiltered.length-1,_slashPos+d));
  document.querySelectorAll('.slash-item').forEach((el,i)=>{
    el.classList.toggle('sel',i===_slashPos);
    if(i===_slashPos)el.scrollIntoView({block:'nearest'});
  });
}
function slashSelect(i){_slashPos=i;slashCommit();}
function slashKey(e){
  if(e.key==='ArrowDown'){e.preventDefault();slashMove(1);}
  else if(e.key==='ArrowUp'){e.preventDefault();slashMove(-1);}
  else if(e.key==='Enter'){e.preventDefault();slashCommit();}
  else if(e.key==='Escape'){slashClose();}
}
function slashCommit(){
  if(!_slashFiltered[_slashPos])return;
  const b=_slashFiltered[_slashPos];
  const ta=document.getElementById('fs-content-inp'),pos=ta.selectionStart;
  const before=ta.value.substring(0,_slashStart);
  const after=ta.value.substring(pos);
  fsSnap();
  ta.value=before+b.ins+after;
  ta.selectionStart=ta.selectionEnd=before.length+b.ins.length;
  ta.focus();fsWC();slashClose();
}
</script>

  box.textContent = '⏳ Testing connection…';

  if (data.ok) {
    box.className = 'probe-box probe-ok';
    box.textContent = `✓ Connected — ${data.models.length} model(s) found: ${data.models.join(', ') || 'none'}`;

    box.className = 'probe-box probe-err';
    box.textContent = `✗ Connection failed: ${data.error}`;
  }

async function fetchOllamaModels() {
  const url = document.getElementById('s-ollama-url').value.trim();
  const sel = document.getElementById('s-ollama-model');
  const current = sel.value;
  sel.innerHTML = '<option>⏳ Loading…</option>';
  const data = await fetch(`${API}/settings/ollama-models?base_url=${encodeURIComponent(url)}`).then(r => r.json());

    sel.innerHTML = data.models.map(m =>
      `<option value="${m}" ${m === current ? 'selected' : ''}>${m}</option>`
    ).join('');

  } else {
    sel.innerHTML = `<option value="${current}">${current}</option>`;
    toast(data.error || 'No models found', true);
  }
}

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),

      msg.textContent = `✓ Saved — now using ${backend === 'ollama' ? 'Ollama' : 'Claude API'}`;

    msg.textContent = '✗ ' + e.message; msg.style.color = 'var(--red)';
  }

}
